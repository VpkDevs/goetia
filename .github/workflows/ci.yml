name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Headless: ECS/jobs/PCG/combat/procgen/data unit tests plus the
      # 10,000-tick horde determinism test. No window, no GPU.
      - run: cargo test --workspace
