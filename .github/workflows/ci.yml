name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A new push to a PR cancels the previous run — no queue pile-ups.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Fail fast on a dependency that can't resolve, rather than hanging.
  CARGO_NET_RETRY: 3

jobs:
  fmt:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  lint-and-test:
    name: clippy + tests (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rodio/cpal link against ALSA and winit against udev, even though the
      # tests themselves are headless (no window, no GPU).
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      # Headless suite: engine ECS/jobs/PCG/combat/procgen/data unit tests, the
      # 10,000-tick horde determinism test, and DEMONICON's 8 acceptance tests
      # (content validity, build composition, trigger containment, per-realm
      # determinism, full boss-kill -> clear -> loot-shower loop).
      - name: Test workspace
        run: cargo test --workspace

  # The dev platform. Catches Windows-only breakage (path handling, the
  # windowing/audio backends) that Linux CI would miss.
  test-windows:
    name: tests (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # Determinism is a load-bearing engine guarantee, so it gets its own signal:
  # if this job alone goes red, the sim diverged rather than the code breaking.
  determinism:
    name: determinism guarantee
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Engine — 10k ticks, twice, bit-identical
        run: cargo test -p sandbox --release -- --nocapture
      - name: Game — per-realm run determinism
        run: cargo test -p demonicon --test acceptance full_run_sim_is_deterministic
